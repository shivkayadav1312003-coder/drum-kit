<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Drum Kit</title>
        <link rel="stylesheet" href="drum.css">
    </head>
    <body>
        <div id="outer">
          <div class="heading">
            <h1>This is Your Drum Kit</h1>
          </div>
        </div>
       
        <div class="container">
            <img class="img"src="bigdrum.png" alt="drum set" height="500px" width="500px">
            <img class="wave" src="wave.png" alt="sound wave picture">
            <div class=" drum stick" data-sound="s"></div>
            <div class=" drum stick2" data-sound="s"></div>
            <div class="drum snare" data-sound="d"></div>
            <div class="drum snare2" data-sound="d"></div>
            <div class="drum cymbals" data-sound="a"></div>
            <div class="drum cymbals2" data-sound="a"></div>
            <div class="drum bass" data-sound="k"></div>
        </div>

        <div class="keys">
            <p class="one">Touch the components 'or' press the follwing keys to play</p>
            <div class="button">
            <button class="B">A</button>
            <button class="B">S</button>
            <button class="B">D</button>
            <button class="B">K</button>
            </div>
        </div>



    <script src="drum.js"></script>
    </body>
</html>
